  <line x1="650" y1="415" x2="1055" y2="340" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <text x="100" y="930" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">Layout notes: users and Front Door at the top, App Gateway below, web/app tiers in the middle, data services at the bottom-right, firewall on the bottom-left, monitoring centered below.</text>
