  <text x="90" y="112" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Single VNet: vnet-contoso-auea-001 (10.10.0.0/16)</text>

  <rect x="90" y="140" width="1620" height="860" rx="16" ry="16" fill="#eef8ff" stroke="#4b5563" stroke-width="2"/>

  <rect x="120" y="180" width="520" height="260" rx="12" ry="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="212" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">Frontend Subnet</text>
  <text x="140" y="236" font-family="Segoe UI,Arial,sans-serif" font-size="13">snet-frontend (10.10.1.0/24)</text>

